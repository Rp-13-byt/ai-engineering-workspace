apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: ai-workspace
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: ai-workspace-api:latest
          imagePullPolicy: Never
          envFrom:
            - configMapRef:
                name: workspace-config
            - secretRef:
                name: workspace-secrets
          ports:
            - containerPort: 8000
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: ai-workspace
spec:
  ports:
    - port: 8000
      targetPort: 8000
  selector:
    app: api
