apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: ai-workspace
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: ai-workspace-web:latest
          imagePullPolicy: Never
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "http://api.ai-workspace.svc.cluster.local:8000/api/v1"
            - name: NEXT_PUBLIC_WS_URL
              value: "ws://api.ai-workspace.svc.cluster.local:8000/ws"
          ports:
            - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: ai-workspace
spec:
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: 3000
  selector:
    app: web
