apiVersion: v1
kind: Secret
metadata:
  name: workspace-secrets
type: Opaque
stringData:
  DATABASE_URL: postgresql+asyncpg://workspace:replace-me@postgres.example.com:5432/workspace
  SYNC_DATABASE_URL: postgresql://workspace:replace-me@postgres.example.com:5432/workspace
  REDIS_URL: redis://redis.example.com:6379/0
  RABBITMQ_URL: amqp://workspace:replace-me@rabbitmq.example.com:5672/
  JWT_SECRET: replace-me
  GITHUB_CLIENT_ID: replace-me
  GITHUB_CLIENT_SECRET: replace-me
  GITHUB_WEBHOOK_SECRET: replace-me
  OPENAI_API_KEY: replace-me
  GEMINI_API_KEY: replace-me
  S3_ENDPOINT_URL: https://s3.example.com
  S3_ACCESS_KEY_ID: replace-me
  S3_SECRET_ACCESS_KEY: replace-me
