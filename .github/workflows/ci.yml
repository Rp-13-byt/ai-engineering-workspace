name: ci

on:
  push:
    branches: [main, feature/**]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  backend:
    name: backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: workspace
          POSTGRES_PASSWORD: workspace
          POSTGRES_DB: workspace
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U workspace -d workspace"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7.4-alpine
        ports:
          - 6379:6379
      rabbitmq:
        image: rabbitmq:3.13
        env:
          RABBITMQ_DEFAULT_USER: workspace
          RABBITMQ_DEFAULT_PASS: workspace
        ports:
          - 5672:5672
    env:
      DATABASE_URL: postgresql+asyncpg://workspace:workspace@localhost:5432/workspace
      SYNC_DATABASE_URL: postgresql+psycopg://workspace:workspace@localhost:5432/workspace
      REDIS_URL: redis://localhost:6379/0
      RABBITMQ_URL: amqp://workspace:workspace@localhost:5672/
      JWT_SECRET: test-secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend
        working-directory: apps/api
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"
      - name: Lint backend
        working-directory: apps/api
        run: ruff check src tests
      - name: Migrate database
        working-directory: apps/api
        run: alembic upgrade head
      - name: Test backend
        working-directory: apps/api
        run: coverage run -m pytest && coverage report --fail-under=70

  frontend:
    name: frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install frontend
        working-directory: apps/web
        run: npm install
      - name: Test frontend
        working-directory: apps/web
        run: npm test
      - name: Build frontend
        working-directory: apps/web
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
          NEXT_PUBLIC_WS_URL: ws://localhost:8000/ws
        run: npm run build

  containers:
    name: containers
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build images
        run: |
          docker build -t ai-workspace-api:ci apps/api
          docker build -t ai-workspace-web:ci apps/web
          docker build -f apps/worker/Dockerfile -t ai-workspace-worker:ci .
      - name: Scan API image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ai-workspace-api:ci
          format: sarif
          output: trivy-api.sarif
      - name: Upload scan
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-api.sarif
